<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Universe 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="bgMusic" src="song.mp3" loop preload="auto"></audio>

<canvas id="starCanvas"></canvas>

<section id="intro" class="center fade">
  <h1>
    On 25 January 2025 at 9:30 PM...<br>
    The Universe Changed Forever ✨
  </h1>
  <button id="enterBtn" class="glow-btn">
    Tap To Enter Our Universe 💫
  </button>
</section>

<section id="main" class="hidden fade">

  <h1 class="title">Happy Birthday Gayatri 💖</h1>

  <div class="card">
    <h2>Our Love Has Been Growing For:</h2>
    <p id="loveCounter"></p>
  </div>

  <div class="card">
    <h2 id="typedText"></h2><span class="cursor">|</span>
  </div>

  <div class="card">
    <div id="cake">🎂</div>
    <p id="wishText"></p>
  </div>

  <div class="card">
    <h2>Our Memories 💞</h2>
    <video src="video1.mp4" controls></video>
    <video src="video2.mp4" controls></video>
    <video src="video4.mp4" controls></video>
  </div>

  <div class="card">
    <button id="secretBtn" class="glow-btn">💎 Unlock Secret</button>
    <p class="hint">Hint: This number is very special to us...</p>
    <div id="secretMessage" class="hidden secret">
      In Every Universe... I Choose You 💖
    </div>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
